<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pptx-forge — browser</title>
<style>/*__APP_STYLES__*/</style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">pptx-forge <span id="app-version" class="version-tag"></span></div>
      <button id="help-btn" class="icon-btn icon-btn-spaced" title="Help" aria-label="Help">?</button>
      <div class="workspace-group" title="Workspace">
        <select id="workspace-select"></select>
        <input id="workspace-rename-input" class="workspace-rename-input" type="text" spellcheck="false" autocomplete="off">
        <button id="workspace-rename-btn" class="icon-btn" title="Rename workspace" aria-label="Rename workspace">✎</button>
        <button id="workspace-new-btn" class="icon-btn icon-btn-spaced" title="New workspace" aria-label="New workspace">
          <span class="icon icon-plus"></span>
        </button>
        <button id="workspace-import-btn" class="icon-btn" title="Import workspace from zip" aria-label="Import workspace">
          <span class="icon icon-arrow-down-tray"></span>
        </button>
        <button id="workspace-export-btn" class="icon-btn" title="Export workspace as zip" aria-label="Export workspace">
          <span class="icon icon-arrow-up-tray"></span>
        </button>
        <button id="workspace-delete-btn" class="icon-btn" title="Delete workspace" aria-label="Delete workspace">🗑</button>
      </div>
      <div class="spacer"></div>
      <div class="ai-group">
        <label class="ai-components-toggle" title="Include the pre-built comp/layout/frame component catalog in the copied AI reference">
          <input type="checkbox" id="ai-components-toggle">
          Include builtin components
        </label>
        <button id="ai-btn" title="Copy AI reference">✨ AI</button>
      </div>
      <div class="forge-group">
        <label class="timestamp-toggle" title="Append a timestamp to the forge output filename">
          <input type="checkbox" id="timestamp-toggle">
          Timestamp
        </label>
        <button id="forge-btn">⚡ Forge</button>
      </div>
    </header>
    <div class="workspace">
      <aside class="sidebar">
        <div class="sidebar-header">Explorer</div>
        <span id="node-actions" class="node-actions">
          <span id="filename-group" class="filename-group" title="Click to rename">
            <span id="active-filename"></span>
            <input id="rename-input" class="rename-input" type="text" spellcheck="false" autocomplete="off">
            <span id="rename-ext" class="rename-ext">.js</span>
            <button id="rename-btn" class="icon-btn inline-rename" title="Rename" aria-label="Rename">✎</button>
          </span>
          <span id="node-actions-buttons" class="node-actions-buttons">
            <button id="move-btn" class="icon-btn" title="Move to workspace…" aria-label="Move to workspace">
              <span class="icon icon-scissors"></span>
            </button>
            <button id="copy-btn" class="icon-btn" title="Copy to workspace…" aria-label="Copy to workspace">
              <span class="icon icon-copy"></span>
            </button>
            <button id="discard-btn" class="icon-btn" title="Discard" aria-label="Discard">🗑</button>
            <button id="reset-btn" class="icon-btn icon-btn-lg" title="Reset to default" aria-label="Reset to default">
              <span class="icon icon-rotate-ccw"></span>
            </button>
            <button id="download-btn" class="icon-btn" title="Download" aria-label="Download">
              <span class="icon icon-arrow-up-tray"></span>
            </button>
          </span>
        </span>
        <ul id="theme-list" class="file-tree"></ul>
        <div class="tree-group-header">
          <span class="tree-group-label">Slides</span>
          <span class="node-actions-buttons">
            <button id="add-slide-btn" class="icon-btn" title="New slide" aria-label="New slide">
              <span class="icon icon-plus"></span>
            </button>
            <button id="load-files-btn" class="icon-btn" title="Load slides" aria-label="Load slides">
              <span class="icon icon-arrow-down-tray"></span>
            </button>
          </span>
        </div>
        <ul id="file-list" class="file-tree"></ul>
        <input id="file-input" type="file" accept=".js,.zip" multiple hidden>
      </aside>
      <main class="editor-pane">
        <div class="editor-top" id="editor-top">
          <textarea id="editor" spellcheck="false"></textarea>
        </div>
        <div class="pane-resizer" id="pane-resizer" title="Drag to resize the preview"></div>
        <div class="preview-pane" id="preview-pane">
          <div class="preview-toolbar">
            <span class="preview-label">Preview</span>
            <span id="preview-status" class="preview-status"></span>
            <span class="spacer"></span>
            <button id="preview-copy-btn" class="icon-btn" title="Copy preview as PNG" aria-label="Copy preview as PNG">
              <span class="icon icon-copy"></span>
            </button>
            <button id="preview-download-btn" class="icon-btn" title="Download preview as PNG" aria-label="Download preview as PNG">
              <span class="icon icon-arrow-up-tray"></span>
            </button>
            <button id="preview-collapse-btn" class="icon-btn" title="Collapse preview" aria-label="Collapse preview">▾</button>
          </div>
          <div class="preview-canvas-wrap">
            <canvas id="preview-canvas"></canvas>
          </div>
        </div>
      </main>
    </div>
  </div>
  <div id="toast-stack" class="toast-stack" aria-live="polite"></div>
  <div class="drop-overlay" id="drop-overlay">Drop .js files or a .zip workspace to load them</div>
  <div class="ai-overlay" id="ai-overlay">
    <div class="ai-panel">
      <div class="ai-panel-header">
        <span>AI reference — copy manually</span>
        <button id="ai-overlay-close" class="icon-btn" title="Close" aria-label="Close">✕</button>
      </div>
      <textarea id="ai-reference-textarea" readonly spellcheck="false"></textarea>
    </div>
  </div>
  <div class="ai-overlay" id="transfer-overlay">
    <div class="ai-panel transfer-panel">
      <div class="ai-panel-header">
        <span id="transfer-overlay-title">Move slide to…</span>
        <button id="transfer-overlay-close" class="icon-btn" title="Close" aria-label="Close">✕</button>
      </div>
      <ul id="transfer-target-list" class="transfer-target-list"></ul>
    </div>
  </div>
  <div class="ai-overlay" id="help-overlay">
    <div class="ai-panel help-panel">
      <div class="ai-panel-header">
        <span>Help</span>
        <button id="help-overlay-close" class="icon-btn" title="Close" aria-label="Close">✕</button>
      </div>
      <div class="help-scroll">
        <div class="help-hero">
          <span id="help-emoji" class="help-emoji"></span>
          <h3 id="help-title" class="help-title"></h3>
        </div>
        <div id="help-body" class="help-body"></div>
      </div>
      <div class="help-footer">
        <button id="help-prev-btn" class="help-nav-btn" aria-label="Previous screen">‹ Prev</button>
        <span id="help-dots" class="help-dots"></span>
        <button id="help-next-btn" class="help-nav-btn" aria-label="Next screen">Next ›</button>
      </div>
    </div>
  </div>
  <script>/*__APP_BUNDLE__*/</script>
</body>
</html>
