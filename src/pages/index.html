<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pptx-forge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.75rem;
    }

    .tagline {
      color: #555;
      font-size: 1rem;
      line-height: 1.5;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      display: block;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: #1a1a1a;
      border: 1px solid #ccc;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 2rem 0 1.5rem;
    }

    .download-note {
      font-size: 0.875rem;
      color: #777;
    }
    .download-note a {
      color: #1a1a1a;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>pptx-forge</h1>
    <p class="tagline">
      Compile JavaScript slide files into PowerPoint decks.<br>
      Author slides as plain <code>.js</code> files — no PowerPoint, no drag-and-drop.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="pptx-forge.html">Try it in your browser &rarr;</a>
      <a class="btn btn-secondary" href="https://github.com/awaragi/pptx-forge">View on GitHub</a>
    </div>

    <hr class="divider">

    <p class="download-note">
      Or <a href="https://github.com/awaragi/pptx-forge/releases/latest/download/pptx-forge.html">download the latest release</a>
      to run offline — no Node.js required.
    </p>
  </div>
</body>
</html>
