name: Pages

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build browser tool
        run: npm run build:browser

      - name: Assemble site
        run: |
          mkdir -p _site
          cp src/pages/index.html _site/index.html
          cp pptx-forge.html _site/pptx-forge.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
