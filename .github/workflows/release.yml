name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build browser tool
        run: npm run build:browser

      - name: Create release archive
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          git archive --format=zip --prefix="pptx-forge-${tag}/" HEAD > "pptx-forge-${tag}.zip"

      - name: Add lib.d.ts.txt to archive
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          cp lib.d.ts lib.d.ts.txt
          zip "pptx-forge-${tag}.zip" lib.d.ts.txt

      - name: Copy browser build with versioned name
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          cp pptx-forge.html "pptx-forge-${tag}.html"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="pptx-forge $tag" \
            --generate-notes \
            "pptx-forge-${tag}.zip" \
            "pptx-forge-${tag}.html" \
            pptx-forge.html
