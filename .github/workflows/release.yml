name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release archive
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          git archive --format=zip --prefix="pptx-forge-${tag}/" HEAD > "pptx-forge-${tag}.zip"

      - name: Add lib.d.ts.txt to archive
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          cp lib.d.ts lib.d.ts.txt
          zip "pptx-forge-${tag}.zip" lib.d.ts.txt

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="pptx-forge $tag" \
            --generate-notes \
            "pptx-forge-${tag}.zip"
